[package]
name = "toybox"
version = "0.1.0"
edition = "2024"

[dependencies]
clack-plugin = { git = "https://github.com/prokopyl/clack.git", package = "clack-plugin" }
clack-extensions = { git = "https://github.com/prokopyl/clack.git", package = "clack-extensions", features = ["params", "clack-plugin"] }
baseview = { git = "https://github.com/RustAudio/baseview.git", rev = "237d323c729f3aa99476ba3efa50129c5e86cad3", version = "0.1.0", optional = true }
egui-baseview = { git = "https://codeberg.org/BillyDM/egui-baseview.git", version = "0.7.0", optional = true }
raw-window-handle = { version = "0.5.2", optional = true }

[features]
default = []
gui = ["dep:baseview", "dep:egui-baseview", "dep:raw-window-handle"]

[workspace]
members = ["examples/minimal-clap"]
