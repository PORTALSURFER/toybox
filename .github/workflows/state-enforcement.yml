name: State Enforcement

on:
  push:
    branches: [main]
  pull_request:

jobs:
  state-enforcement-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure private git dependencies
        shell: bash
        env:
          RADIANT_REPO_TOKEN: ${{ secrets.RADIANT_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${RADIANT_REPO_TOKEN}" ]]; then
            echo "::error::RADIANT_REPO_TOKEN is required to fetch private git dependencies"
            exit 1
          fi
          git config --global url."https://x-access-token:${RADIANT_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install --yes ripgrep

      - name: Validate pinned git dependencies
        run: ./scripts/check_pinned_git_deps.sh

      - name: Validate plugin state enforcement
        run: ./scripts/check_clap_state_enforcement.sh

      - name: Validate declarative slot API naming
        run: ./scripts/check_declarative_slot_api.sh

      - name: Build minimal CLAP example
        run: cargo check -p toybox-minimal-clap

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: >-
          cargo clippy --workspace --all-targets --features gui
          --exclude toybox-vst3-ffi
          --exclude toybox-minimal-vst3
          -- -D warnings

      - name: Lint toybox VST3 feature (SDK optional)
        if: ${{ vars.VST3_SDK_DIR != '' }}
        env:
          VST3_SDK_DIR: ${{ vars.VST3_SDK_DIR }}
        run: cargo clippy -p toybox --all-targets --features vst3 -- -D warnings

      - name: Test toybox VST3 feature (SDK optional)
        if: ${{ vars.VST3_SDK_DIR != '' }}
        env:
          VST3_SDK_DIR: ${{ vars.VST3_SDK_DIR }}
        run: cargo test -p toybox --features vst3

      - name: Run toybox state helper tests
        run: cargo test -p toybox clap::state

      - name: Run toybox docs tests
        run: cargo test -p toybox --doc

  gui-build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure private git dependencies
        shell: bash
        env:
          RADIANT_REPO_TOKEN: ${{ secrets.RADIANT_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${RADIANT_REPO_TOKEN}" ]]; then
            echo "::error::RADIANT_REPO_TOKEN is required to fetch private git dependencies"
            exit 1
          fi
          git config --global url."https://x-access-token:${RADIANT_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build patchbay-gui
        run: cargo check -p patchbay-gui

      - name: Build toybox with GUI feature
        run: cargo check -p toybox --features gui

      - name: Test patchbay-gui
        run: cargo test -p patchbay-gui

      - name: Test toybox with GUI feature
        run: cargo test -p toybox --features gui

      - name: Lint toybox VST3 feature (SDK optional)
        if: ${{ vars.VST3_SDK_DIR != '' }}
        env:
          VST3_SDK_DIR: ${{ vars.VST3_SDK_DIR }}
        run: cargo clippy -p toybox --all-targets --features vst3 -- -D warnings

      - name: Test toybox VST3 feature (SDK optional)
        if: ${{ vars.VST3_SDK_DIR != '' }}
        env:
          VST3_SDK_DIR: ${{ vars.VST3_SDK_DIR }}
        run: cargo test -p toybox --features vst3
